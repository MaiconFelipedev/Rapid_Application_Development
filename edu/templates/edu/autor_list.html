{% extends 'edu/base.html' %}

{% block content %}
<h2>Autores</h2>
<a href="{% url 'autor_create' %}" class="btn btn-primary mb-3">Novo Autor</a>

<table class="table table-bordered">
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Ações</th>
    </tr>
    {% for autor in autores %}
    <tr>
        <td>{{ autor.id }}</td>
        <td>{{ autor.nome }}</td>
        <td>
            <a href="{% url 'autor_update' autor.id %}" class="btn btn-warning btn-sm">Editar</a>
            <a href="{% url 'autor_delete' autor.id %}" class="btn btn-danger btn-sm">Excluir</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
